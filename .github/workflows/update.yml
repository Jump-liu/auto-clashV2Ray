name: Update Nodes

on:
  schedule:
    - cron: '0 0 * * *'  # 每天北京时间早上8点自动运行 (UTC时间0点)
  workflow_dispatch:     # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install requests pyyaml

      - name: Run Update Script
        env:
          SUB_URLS: ${{ secrets.SUB_URLS }}
          CLASH_OUTPUT: 'uploads/clash.yaml'
          V2RAY_OUTPUT: 'uploads/v2ray.txt'
        run: |
          python3 << 'EOF'
import os
import requests
import yaml
import base64
import re

def decode_base64(data):
    missing_padding = len(data) % 4
    if missing_padding:
        data += '=' * (4 - missing_padding)
    try:
        return base64.b64decode(data).decode('utf-8')
    except:
        return ""

def fetch_nodes():
    sub_urls = os.environ.get('SUB_URLS', '')
    if not sub_urls:
        print("❌ 未找到订阅链接，请在 Settings -> Secrets 中配置 SUB_URLS")
        return [], []

    clash_nodes = []
    v2ray_nodes = []

    urls = [u.strip() for u in sub_urls.split('\n') if u.strip()]
    
    for url in urls:
        try:
            print(f"正在获取: {url}")
            resp = requests.get(url, timeout=15)
            if resp.status_code == 200:
                content = resp.text
                # 尝试判断是 Base64 还是 YAML
                if 'proxies:' in content:
                    # 已经是 Clash 格式
                    try:
                        data = yaml.safe_load(content)
                        if data and 'proxies' in data:
                            clash_nodes.extend(data['proxies'])
                            # 简单转换到 V2Ray (仅作为示例，实际可能需要更复杂的转换)
                            # 这里为了简化，我们主要依赖原始数据如果是 base64 的情况
                    except:
                        pass
                else:
                    # 尝试 Base64 解码
                    decoded = decode_base64(content)
                    if 'vmess://' in decoded or 'trojan://' in decoded or 'ss://' in decoded:
                        lines = decoded.split('\n')
                        v2ray_nodes.extend([l for l in lines if l.startswith(('vmess://', 'trojan://', 'ss://', 'vless://'))])
                        # 如果有解码后的内容，尝试再次解析是否为 yaml (有些机场返回解码后是 yaml)
                        if 'proxies:' in decoded:
                             try:
                                data = yaml.safe_load(decoded)
                                if data and 'proxies' in data:
                                    clash_nodes.extend(data['proxies'])
                             except:
                                pass
                    elif 'proxies:' in decoded:
                         try:
                            data = yaml.safe_load(decoded)
                            if data and 'proxies' in data:
                                clash_nodes.extend(data['proxies'])
                         except:
                            pass
            else:
                print(f"获取失败: {resp.status_code}")
        except Exception as e:
            print(f"错误: {e}")

    return clash_nodes, v2ray_nodes

def save_files(clash_nodes, v2ray_nodes):
    # 保存 Clash
    if clash_nodes:
        # 去重 (简单的名字去重)
        seen_names = set()
        unique_clash = []
        for node in clash_nodes:
            name = node.get('name', '')
            if name not in seen_names:
                seen_names.add(name)
                unique_clash.append(node)
        
        final_clash = {'proxies': unique_clash}
        with open(os.environ['CLASH_OUTPUT'], 'w', encoding='utf-8') as f:
            yaml.dump(final_clash, f, allow_unicode=True)
        print(f"✅ Clash 节点已保存: {len(unique_clash)} 个")
    else:
        print("⚠️ 未获取到有效的 Clash 节点")
        # 创建一个空文件占位
        with open(os.environ['CLASH_OUTPUT'], 'w') as f:
            f.write("# No nodes found")

    # 保存 V2Ray
    if v2ray_nodes:
        # 去重
        unique_v2ray = list(set(v2ray_nodes))
        with open(os.environ['V2RAY_OUTPUT'], 'w', encoding='utf-8') as f:
            f.write('\n'.join(unique_v2ray))
        print(f"✅ V2Ray 节点已保存: {len(unique_v2ray)} 个")
    else:
        print("⚠️ 未获取到有效的 V2Ray 节点")
        with open(os.environ['V2RAY_OUTPUT'], 'w') as f:
            f.write("# No nodes found")

if __name__ == '__main__':
    c, v = fetch_nodes()
    save_files(c, v)
EOF

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add uploads/
          git diff --quiet && git diff --staged --quiet || git co
