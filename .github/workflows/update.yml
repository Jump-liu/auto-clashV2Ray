name: Update Nodes (Clash/V2Ray/Sing-box)

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0点 (北京时间早8点) 运行
  workflow_dispatch:     # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install requests pyyaml

      - name: Run Update Script
        env:
          SUB_URLS: ${{ secrets.SUB_URLS }}
          CLASH_OUTPUT: 'uploads/clash.yaml'
          V2RAY_OUTPUT: 'uploads/v2ray.txt'
          SINGBOX_OUTPUT: 'uploads/singbox.json'
        run: |
          python3 << 'EOF'
import os
import requests
import yaml
import base64
import json
import re
import random
from urllib.parse import urlparse, parse_qs

# 模拟真实客户端的 User-Agent 池，防止被机场屏蔽
USER_AGENTS = [
    "ClashMetaForAndroid/2.8.9",
    "ClashForWindows/0.20.0",
    "sing-box/1.8.0",
    "V2RayN/6.33",
    "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
]

def get_random_ua():
    return random.choice(USER_AGENTS)

def decode_base64(data):
    if not data:
        return ""
    missing_padding = len(data) % 4
    if missing_padding:
        data += '=' * (4 - missing_padding)
    try:
        # 尝试 URL Safe 解码
        return base64.urlsafe_b64decode(data).decode('utf-8', errors='ignore')
    except:
        try:
            return base64.b64decode(data).decode('utf-8', errors='ignore')
        except:
            return ""

def convert_clash_to_singbox(clash_node):
    """将 Clash 格式节点转换为 Singbox 格式"""
    try:
        node_type = clash_node.get('type')
        if not node_type:
            return None
            
        sb_node = {
            "tag": clash_node.get('name', 'unnamed'),
            "type": node_type,
            "server": clash_node.get('server'),
            "server_port": clash_node.get('port')
        }
        
        # 通用 TLS 设置
        if clash_node.get('tls') or node_type in ['trojan', 'vless', 'hysteria', 'hysteria2']:
            sb_node['tls'] = {
                "enabled": True,
                "insecure": clash_node.get('skip-cert-verify', False),
                "server_name": clash_node.get('sni', clash_node.get('server'))
            }
            if clash_node.get('alpn'):
                sb_node['tls']['alpn'] = clash_node['alpn']

        if node_type == 'vmess':
            sb_node['uuid'] = clash_node.get('uuid')
            sb_node['alter_id'] = clash_node.get('alterId', 0)
            sb_node['security'] = clash_node.get('cipher', 'auto')
            if clash_node.get('network') == 'ws':
                opts = clash_node.get('ws-opts', {})
                sb_node['transport'] = {
                    "type": "ws",
                    "path": opts.get('path', '/'),
                    "headers": {"Host": opts.get('headers', {}).get('Host', '')}
                }
            elif clash_node.get('network') == 'grpc':
                sb_node['transport'] = {
                    "type": "grpc",
                    "service_name": clash_node.get('grpc-opts', {}).get('grpc-service-name', '')
                }
                
        elif node_type == 'trojan':
            sb_node['password'] = clash_node.get('password')
            if clash_node.get('network') == 'ws':
                opts = clash_node.get('ws-opts', {})
                sb_node['transport'] = {
                    "type": "ws",
                    "path": opts.get('path', '/'),
                    "headers": {"Host": opts.get('headers', {}).get('Host', '')}
                }
                
        elif node_type == 'ss':
            sb_node['method'] = clash_node.get('cipher')
            sb_node['password'] = clash_node.get('password')
            
        elif node_type == 'vless':
            sb_node['uuid'] = clash_node.get('uuid')
            sb_node['flow'] = clash_node.get('flow', '')
            sb_node['packet_encoding'] = 'xudp'
            if clash_node.get('network') == 'ws':
                opts = clash_node.get('ws-opts', {})
                sb_node['transport'] = {
                    "type": "ws",
                    "path": opts.get('path', '/'),
                    "headers": {"Host": opts.get('headers', {}).get('Host', '')}
                }
            elif clash_node.get('network') == 'grpc':
                sb_node['transport'] = {
                    "type": "grpc",
                    "service_name": clash_node.get('grpc-opts', {}).get('grpc-service-name', '')
                }
            elif clash_node.get('network') == 'tcp' and clash_node.get('reality-opts'):
                 sb_node['tls']['reality'] = {
                     "enabled": True,
                     "public_key": clash_node['reality-opts'].get('public-key'),
                     "short_id": clash_node['reality-opts'].get('short-id')
                 }
        elif node_type in ['hysteria', 'hysteria2']:
            sb_node['password'] = clash_node.get('password', clash_node.get('auth_str'))
            if node_type == 'hysteria':
                sb_node['up_mbps'] = clash_node.get('up', 100)
                sb_node['down_mbps'] = clash_node.get('down', 100)
                sb_node['obfs'] = clash_node.get('obfs', '')
            else: # hysteria2
                sb_node['obfs'] = {
                    "type": clash_node.get('obfs-type', 'salamander'),
                    "password": clash_node.get('obfs-password', '')
                }
        else:
            return None # 不支持的类型
            
        # 清理空值
        if 'tls' in sb_node and not sb_node['tls'].get('enabled'):
            del sb_node['tls']
            
        return sb_node
    except Exception as e:
        # print(f"转换节点失败: {e}")
        return None

def parse_v2ray_line(line):
    """解析 V2Ray 链接为字典"""
    try:
        line = line.strip()
        if not line: return None
        
        if line.startswith('vmess://'):
            content = decode_base64(line[8:])
            if not content: return None
            data = json.loads(content)
            return {
                'type': 'vmess', 'tag': data.get('ps', 'unnamed'),
                'server': data.get('add'), 'server_port': int(data.get('port')),
                'uuid': data.get('id'), 'alter_id': int(data.get('aid', 0)),
                'security': data.get('scy', 'auto'),
                'network': data.get('net', 'tcp'),
                'path': data.get('path', ''), 'host': data.get('host', '')
            }
        elif line.startswith('vless://'):
            parsed = urlparse(line)
            query = parse_qs(parsed.query)
            return {
                'type': 'vless', 'tag': parsed.fragment or 'unnamed',
                'server': parsed.hostname, 'server_port': parsed.port,
                'uuid': parsed.username,
                'flow': query.get('flow', [''])[0],
                'network': query.get('type', ['tcp'])[0],
                'path': query.get('path', [''])[0],
                'host': query.get('host', [''])[0],
                'serviceName': query.get('serviceName', [''])[0]
            }
        elif line.startswith('trojan://'):
            parsed = urlparse(line)
            query = parse_qs(parsed.query)
            return {
                'type': 'trojan', 'tag': parsed.fragment or 'unnamed',
                'server': parsed.hostname, 'server_port': parsed.port,
                'password': parsed.username,
                'network': query.get('type', ['tcp'])[0],
                'path': query.get('path', [''])[0],
                'host': query.get('host', [''])[0]
            }
        elif line.startswith('ss://'):
            raw = line[5:]
            if '#' in raw:
                info, tag = raw.rsplit('#', 1)
            else:
                info, tag = raw, 'unnamed-ss'
            try:
                if '@' in info:
                    method_pass, host_port = info.split('@', 1)
                    decoded_mp = decode_base64(method_pass)
                    if ':' in decoded_mp:
                        method, password = decoded_mp.split(':', 1)
                    else:
                        return None
                    host, port = host_port.rsplit(':', 1)
                    return {
                        'type': 'shadowsocks', 'tag': tag,
                        'server': host, 'server_port': int(port),
                        'method': method, 'password': password
                    }
            except: return None
        return None
    except: return None

def fetch_and_convert():
    sub_urls = os.environ.get('SUB_URLS', '')
    if not sub_urls:
        print("❌ 错误: 未找到 SUB_URLS 环境变量")
        return [], [], []

    clash_nodes = []
    v2ray_lines = []
    singbox_outbounds = []

    urls = [u.strip() for u in sub_urls.split('\n') if u.strip()]
    print(f"🚀 开始处理 {len(urls)} 个订阅链接...")
    
    for url in urls:
        try:
            print(f"📡 正在获取: {url[:30]}...")
            headers = {'User-Agent': get_random_ua()}
            resp = requests.get(url, headers=headers, timeout=20)
            
            if resp.status_code != 200:
                print(f"⚠️ 请求失败: {resp.status_code}")
                continue
                
            content = resp.text
            if not content or len(content) < 10:
                print("⚠️ 返回内容为空或过短")
                continue

            # 1. 尝试解析 Clash YAML
            if 'proxies:' in content:
                try:
                    data = yaml.safe_load(content)
                    if data and 'proxies' in data:
                        count = len(data['proxies'])
                        clash_nodes.extend(data['proxies'])
                        print(f"✅ 解析 Clash 成功: {count} 个节点")
                        for p in data['proxies']:
                            sb = convert_clash_to_singbox(p)
                            if sb: singbox_outbounds.append(sb)
                    continue # 处理完 YAML 跳过后续逻辑
                except Exception as e:
                    print(f"⚠️ YAML 解析失败，尝试 Base64: {e}")

            # 2. 尝试 Base64 解码
            decoded = decode_base64(content)
            
            # 如果解码后包含 proxies，说明是 Base64 包裹的 YAML
            if 'proxies:' in decoded:
                try:
                    data = yaml.safe_load(decoded)
                    if data and 'proxies' in data:
                        count = len(data['proxies'])
                        clash_nodes.extend(data['proxies'])
                        print(f"✅ 解析 Base64(Clash) 成功: {count} 个节点")
                        for p in data['proxies']:
                            sb = convert_clash_to_singbox(p)
                            if sb: singbox_outbounds.append(sb)
                    continue
                except: pass
            
            # 3. 按行处理链接列表
            lines = decoded.split('\n') if decoded else content.split('\n')
            valid_lines_count = 0
            for line in lines:
                line = line.strip()
                if not line or line.startswith('#'): continue
                
                v2ray_lines.append(line)
                valid_lines_count += 1
                
                parsed = parse_v2ray_line(line)
                if parsed:
                    # 构建 Singbox 节点
                    sb = {
                        "tag": parsed.get('tag'),
                        "type": parsed['type'],
                        "server": parsed['server'],
                        "server_port": parsed['server_port']
                    }
                    if parsed['type'] == 'vmess':
                        sb['uuid'] = parsed['uuid']
                        sb['alter_id'] = parsed['alter_id']
                        sb['security'] = parsed['security']
                        if parsed.get('network') == 'ws':
                            sb['transport'] = {"type": "ws", "path": parsed.get('path','/'), "headers": {"Host": parsed.get('host','')}}
                    elif parsed['type'] == 'vless':
                        sb['uuid'] = parsed['uuid']
                        sb['flow'] = parsed.get('flow', '')
                        sb['packet_encoding'] = 'xudp'
                        sb['tls'] = {"enabled": True, "insecure": True}
                        if parsed.get('network') == 'ws':
                            sb['transport'] = {"type": "ws", "path": parsed.get('path','/'), "headers": {"Host": parsed.get('host','')}}
                        elif parsed.get('network') == 'grpc':
                            sb['transport'] = {"type": "grpc", "service_name": parsed.get('serviceName','')}
                    elif parsed['type'] == 'trojan':
                        sb['password'] = parsed['password']
                        sb['tls'] = {"enabled": True, "insecure": True}
                        if parsed.get('network') == 'ws':
                            sb['transport'] = {"type": "ws", "path": parsed.get('path','/'), "headers": {"Host": parsed.get('host','')}}
                    elif parsed['type'] == 'shadowsocks':
                        sb['method'] = parsed['method']
                        sb['password'] = parsed['password']
                    
                    singbox_outbounds.append(sb)
            
            if valid_lines_count > 0:
                print(f"✅ 解析链接列表成功: {valid_lines_count} 个节点")
            else:
                print("⚠️ 未识别出任何有效节点格式")

        except Exception as e:
            print(f"❌ 处理链接时发生严重错误: {e}")

    return clash_nodes, v2ray_lines, singbox_outbounds

def main():
    clash_nodes, v2ray_lines, singbox_outbounds = fetch_and_convert()
    
    total_nodes = len(clash_nodes) + len(v2ray_lines)
    if total_nodes == 0:
        print("\n🛑 致命错误: 未获取到任何节点！停止生成文件以防止覆盖旧配置。")
        exit(1)

    os.makedirs('uploads', exist_ok=True)

    # 1. 保存 Clash
    if clash_nodes:
        with open(os.environ['CLASH_OUTPUT'], 'w', encoding='utf-8') as f:
            yaml.dump({'proxies': clash_nodes}, f, allow_unicode=True, default_flow_style=False)
        print(f"📄 Clash 已保存: {len(clash_nodes)} 个节点")
    
    # 2. 保存 V2Ray (Base64)
    if v2ray_lines:
        raw = '\n'.join(v2ray_lines)
        encoded = base64.b64encode(raw.encode('utf-8')).decode('utf-8')
        with open(os.environ['V2RAY_OUTPUT'], 'w', encoding='utf-8') as f:
            f.write(encoded)
        print(f"📄 V2Ray 已保存: {len(v2ray_lines)} 个节点 (Base64)")

    # 3. 保存 Sing-box (完整配置)
    if singbox_outbounds:
        config = {
            "log": {"level": "info", "timestamp": True},
            "inbounds": [
                {
                    "type": "tun",
                    "inet4_address": "172.19.0.1/30",
                    "inet6_address": "fdfe:dcba:9876::1/126",
                    "auto_route": True,
                    "strict_route": True,
                    "sniff": True
                },
                {
                    "type": "mixed",
                    "listen": "127.0.0.1",
                    "listen_port": 2080,
                    "sniff": True
                }
            ],
            "outbounds": [
                {
                    "type": "selector",
                    "tag": "proxy",
                    "outbounds": ["auto", "direct"] + [n['tag'] for n in singbox_outbounds]
                },
                {
                    "type": "urltest",
                    "tag": "auto",
                    "outbounds": [n['tag'] for n in singbox_outbounds],
                    "url": "http://www.gstatic.com/generate_204",
                    "interval": "10m",
                    "tolerance": 50
                },
                {"type": "direct", "tag": "direct"},
                {"type": "block", "tag": "block"},
                {"type": "dns", "tag": "dns-out"}
            ] + singbox_outbounds,
            "route": {
                "auto_detect_interface": True,
                "final": "proxy",
                "rules": [
                    {"protocol": "dns", "outbound": "dns-out"},
                    {"clash_mode": "direct", "outbound": "direct"},
                    {"clash_mode": "global", "outbound": "proxy"},
                    {"geoip": "cn", "outbound": "direct"},
                    {"geosite": "cn", "outbound": "direct"}
                ]
            },
            "dns": {
                "servers": [
                    {"tag": "google", "address": "tls://8.8.8.8", "detour": "proxy"},
                    {"tag": "local", "address": "https://dns.alidns.com/dns-query", "detour": "direct"},
                    {"tag": "block", "address": "rcode://success"}
                ],
                "rules": [
                    {"outbound": "any", "server": "local"},
                    {"geosite": "cn", "server": "local"},
                    {"clash_mode": "direct", "server": "local"},
                    {"clash_mode": "global", "server": "google"},
                    {"rule_set": "geosite-cn", "server": "local"} 
                ],
                "final": "google",
                "strategy": "fastest",
                "disable_cache": False,
                "disable_expire": False
            }
        }
        with open(os.environ['SINGBOX_OUTPUT'], 'w', encoding='utf-8') as f:
            json.dump(config, f, indent=2, ensure_ascii=False)
        print(f"📄 Sing-box 已保存: {len(singbox_outbounds)} 个节点 (含完整路由/DNS)")

    print("\n🎉 全部完成！请检查 uploads 目录。")

if __name__ == "__main__":
    main()
EOF
