name: Update Nodes (Clash/V2Ray/Sing-box)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install requests pyyaml

      - name: Run Update Script
        env:
          SUB_URLS: ${{ secrets.SUB_URLS }}
          CLASH_OUTPUT: 'uploads/clash.yaml'
          V2RAY_OUTPUT: 'uploads/v2ray.txt'
          SINGBOX_OUTPUT: 'uploads/singbox.json'
        run: python3 update_script.py
